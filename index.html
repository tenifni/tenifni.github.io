<!DOCTYPE html>
<html colspan="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>whereisscarlett_v3</title>
    <style>
        body {
            background-color: #008080; /* Teal Desktop */
            font-family: Arial, Helvetica, sans-serif;
            margin: 40px 20px;
        }

        .container {
            background-color: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff; /* Bevel */
            max-width: 450px;
            margin: 0 auto;

            box-shadow: 4px 4px 0px rgba(0,0,0,0.3);
        }

        /* Simple Blue Header Bar */
        .header-bar {
            background-color: #000080;
            color: #ffffff;
            padding: 4px 8px;
            font-weight: bold;
            font-size: 13px;
        }

        .content {
            padding: 20px;
        }

        .section {
            border: 1px inset #ffffff;
            background-color: #d4d4d4;

            padding: 15px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            margin: 5px 0;
            color: #000;
        }

        .label {
            font-size: 11px;
            font-weight: bold;
            color: #000080;
            text-transform: uppercase;
            display: block;
        }

        .duration {

            color: #cc0000;
            font-weight: bold;
        }

        .marquee-box {
            background-color: #000;
            color: #00ff00;
            padding: 4px;
            font-family: 'Courier New', monospace;
            border: 1px solid #808080;
        }

        /* Input & Button Styling */
        .retro-input {
            width: 95%;
            padding: 4px;
            margin-top: 5px;
            margin-bottom: 10px;
            border: 2px inset #ffffff;

            background-color: #ffffff;
            font-family: Arial, sans-serif;
            font-size: 13px;
            color: #000000;
        }

        .retro-input:focus {
            outline: none;
        }

        .retro-button {
            background-color: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            padding: 4px 15px;
            font-family: Arial, sans-serif;
            font-size: 12px;
            font-weight: bold;
            color: #000000;

            cursor: pointer;
        }

        .retro-button:active {
            border-color: #808080 #ffffff #ffffff #808080;
            padding: 5px 14px 3px 16px;
        }

        .retro-button:disabled {
            color: #808080;
            cursor: not-allowed;
        }

        #result-message {
            margin-top: 10px;
            font-size: 12px;
            font-weight: bold;
            display: none;
            padding: 5px;

            border: 1px solid #808080;
            background: #eee;
        }

        .footer {
            margin-top: 10px;
            font-size: 11px;
            color: #444;
            border-top: 1px solid #808080;
            padding-top: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-bar">whereisscarlett</div>
        
        <div class="content">

            <!-- Location Section -->
            <div class="section">
                <span class="label">Current Location</span>
                <h1 id="location-text">--</h1>
                <div id="duration-text" class="duration">--</div>
                <div id="comment-text" style="font-size: 12px; margin-top: 5px;">--</div>
            </div>

            <!-- Next Stop Section -->
            <div class="section">
                <span class="label">Next Stop</span>
                <div class="marquee-box">
                    <marquee id="next-text" scrollamount="3">--</marquee>
                </div>
            </div>

            <!-- Message Feature Section -->
            <div class="section" style="margin-bottom: 5px;">
                <span class="label">Leave A Message</span>

                <!-- Added ID for JavaScript targeting -->
                <form id="transmission-form" action="https://api.web3forms.com/submit" method="POST">
                    
                    <!-- Web3Forms API Key Config -->
                    <input type="hidden" name="access_key" value="f6cc6504-bba0-4310-9bfc-77638f12079b">
                    <input type="checkbox" name="botcheck" style="display: none;">

                    <input type="text" name="message" class="retro-input" placeholder="Say hello..." maxlength="140" required>
                    
                    <div style="text-align: right;">
                        <!-- Added ID for button targeting -->
                        <button type="submit" id="submit-btn" class="retro-button">Send</button>
                    </div>
                </form>
                <!-- Container for success/fail messages -->
                <div id="result-message"></div>
            </div>

            <div class="footer">

                <b>Last Update:</b> <span id="last-updated">--</span>
            </div>
        </div>
    </div>

    <script>
        const USER_STATUS = {
            location: "MIT",
            duration: "until 2p",
            comment: "responsive to: all channels",//"contact: email, unless your name is jing",
            nextStop: " Lyman",
            updated: "Jul 23, 12:03 AM"
        };

        function updateDisplay() {
            document.getElementById('location-text').innerText = USER_STATUS.location;
            document.getElementById('duration-text').innerText = USER_STATUS.duration;
            document.getElementById('comment-text').innerText = USER_STATUS.comment;
            document.getElementById('next-text').innerText = ">>> " + USER_STATUS.nextStop.toUpperCase() + " <<<";

            document.getElementById('last-updated').innerText = USER_STATUS.updated;
        }

        // Handle Form Submission via AJAX
        const form = document.getElementById('transmission-form');
        const resultDiv = document.getElementById('result-message');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Show loading state
            submitBtn.disabled = true;
            submitBtn.innerText = "Sending...";
            resultDiv.style.display = "none";

            const formData = new FormData(form);
            const object = Object.fromEntries(formData);
            const json = JSON.stringify(object);


            fetch('https://api.web3forms.com/submit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: json
            })
            .then(async (response) => {
                if (response.status === 200) {
                    // Success Case
                    form.style.display = "none";
                    resultDiv.style.display = "block";
                    resultDiv.style.color = "#008000"; // Green for success
                    resultDiv.innerText = "✓ TRANSMISSION SUCCESSFUL";
                } else {
                    // Fail Case (API error)
                    const errorData = await response.json();
                    resultDiv.style.display = "block";

                    resultDiv.style.color = "#cc0000";
                    resultDiv.innerText = "TRANSMISSION FAILED: " + (errorData.message || "Error");
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Send";
                }
            })
            .catch(error => {
                // Fail Case (Network error)
                console.error(error);
                resultDiv.style.display = "block";
                resultDiv.style.color = "#cc0000";
                resultDiv.innerText = "TRANSMISSION FAILED: System Offline";
                submitBtn.disabled = false;
                submitBtn.innerText = "Send";
            });
        });

        window.onload = updateDisplay;
    </script>
</body>
</html>
